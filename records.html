<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายการที่บันทึกไว้ - Note Player SC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="gate" class="screen">
    <div class="card">
      <div class="brand-mark">NP</div>
      <h1>Note Player SC</h1>
      <p>กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
      <input type="password" id="gate-password" placeholder="รหัสผ่าน" autocomplete="off">
      <button id="gate-submit">เข้าสู่ระบบ</button>
      <p id="gate-error" class="error hidden">รหัสผ่านไม่ถูกต้อง</p>
    </div>
  </section>

  <section id="app" class="screen hidden">
    <header>
      <div class="brand">
        <div class="brand-mark brand-mark-small">NP</div>
        <h1>รายการที่บันทึกไว้</h1>
      </div>
      <nav class="nav-links">
        <a href="index.html">กรอกข้อมูลใหม่</a>
        <button id="logout">ออกจากระบบ</button>
      </nav>
    </header>

    <div class="card">
      <div class="table-header">
        <h2>รายการที่บันทึกไว้</h2>
        <button id="refresh-btn">รีเฟรช</button>
      </div>
      <div class="table-wrap">
        <table id="records-table">
          <thead>
            <tr>
              <th><span class="th-text"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>เวลา</span></th>
              <th><span class="th-text"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>ชื่อ</span></th>
              <th><span class="th-text"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v18"/><path d="M5 4h11l-2 4 2 4H5"/></svg>เผ่า</span></th>
              <th><span class="th-text"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.8"/></svg>กลยุทธ์</span></th>
              <th><span class="th-text"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.6-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.4-9.5 9-9.5 9z"/></svg>มารยาท</span></th>
            </tr>
          </thead>
          <tbody id="records-body">
            <tr><td colspan="5" class="empty">ยังไม่มีข้อมูล</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
